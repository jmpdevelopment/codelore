  - id: f12c61a4-1e0b-4b30-bf76-eb676e39a7e6
    file: src/providers/annotationDecorator.ts
    line_start: 149
    line_end: 152
    category: business_rule
    text: >-
      buildStaleHover uses enabledCommands whitelist ['codelore.reanchor'] instead of isTrusted: true. This is a
      security requirement — blanket trust allows injected markdown to execute arbitrary VS Code commands via command:
      URIs. Only the reanchor command is whitelisted.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
    dependencies:
      - file: src/utils/validation.ts
        relationship: sanitizeMarkdownText strips link syntax as a second defense layer against command injection
  - id: 3fa4149e-1c53-4feb-bcb2-37b7b69acf02
    file: src/providers/annotationDecorator.ts
    line_start: 88
    line_end: 108
    category: rationale
    text: >-
      Stale annotations are separated from normal decorations and rendered with a different decoration type (orange
      background + warning icon). The stale check calls verifyAnchor on every render — this is fast (single hash
      comparison) but means decoration rendering depends on content hashing being correct.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
    dependencies:
      - file: src/utils/anchorEngine.ts
        relationship: verifyAnchor is called on every decoration render — if hash logic changes, stale detection changes

    category: behavior
    text: >-
      On save, overlapping critical flags are counted in the total but only unresolved ones appear in the message text.
      If all overlapping flags are reviewed, the critical part is silently omitted from the message while
      annotations/deps may still trigger it.
    source: ai_generated

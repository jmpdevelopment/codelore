annotations:
  - id: 878cee34-afa3-42c9-941d-18a2d725b2e8
    file: src/ai/loreGenerator.ts
    line_start: 267
    line_end: 270
    category: business_rule
    text: >-
      Privacy boundary: only shared annotations are injected into AI context via formatExistingKnowledge(). Personal
      notes (like "I don't understand this") must never appear in AI suggestions that are visible to the team. This is a
      hard privacy requirement.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
    dependencies:
      - file: src/storage/loreStore.ts
        relationship: >-
          loreStore.shared is accessed directly here, bypassing the merged getAnnotations() — this is intentional to
          enforce the privacy boundary
  - id: 796c10a8-8b18-4196-8683-65e064e4ae33
    file: src/ai/loreGenerator.ts
    line_start: 206
    line_end: 214
    category: business_rule
    text: >-
      Overlap replacement only deletes AI-generated annotations (source !== 'manual'). Manual annotations written by
      humans are never auto-deleted, even if an AI suggestion overlaps the same lines. This prevents the AI from
      silently replacing human knowledge.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
  - id: 74986eb7-a32d-44b7-b0eb-a0009f284dae
    file: src/ai/loreGenerator.ts
    line_start: 10
    line_end: 29
    category: rationale
    text: >-
      parseDependencies validates all AI-generated file paths through isSafeRelativePath and validates line ranges. This
      is the trust boundary for AI output — the LLM could return paths like /etc/passwd or ../../secrets.yaml, so every
      field is validated before storage.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
  - id: e6718873-f50d-4ab6-aa57-8a120352701d
    file: src/ai/loreGenerator.ts
    line_start: 224
    line_end: 238
    category: rationale
    text: >-
      addAsSuggested always writes to the shared store (no scope parameter). AI suggestions are considered team
      knowledge by default. If a user wants personal AI notes, they use the quickNote command instead (which forces
      personal scope + ai_prompt category).
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
    dependencies:
      - file: src/commands/quickNote.ts
        relationship: quickNote is the personal-scope counterpart to AI suggestions

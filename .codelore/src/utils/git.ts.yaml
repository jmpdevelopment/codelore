  - id: ccfd364b-8e23-4e8c-b35a-289320cecb88
    file: src/utils/git.ts
    line_start: 36
    line_end: 48
    category: gotcha
    text: >-
      gitChangedFiles has the same HEAD-then-unstaged fallback as gitDiff, but the fallback only triggers on empty
      output, not on error. In a repo with no commits, `git diff HEAD --name-only` throws, so the catch returns [] —
      newly added but unstaged files in an init-only repo will be invisible.
    source: ai_generated
    created_at: '2026-04-18T15:58:55.244Z'
    author: jmpdevelopment
    components:

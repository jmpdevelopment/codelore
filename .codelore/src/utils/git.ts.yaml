    file: src/utils/git.ts
    line_start: 22
    line_end: 32
    category: behavior
    text: >-
      gitDiff first tries `diff HEAD` (staged+unstaged vs last commit); if that's empty, falls back to unstaged-only
      diff. This means for brand-new repos with no commits, the HEAD diff will throw and the function returns undefined
      (the fallback is inside the try, not a separate catch path).
    source: ai_generated
    created_at: '2026-04-18T15:58:55.216Z'

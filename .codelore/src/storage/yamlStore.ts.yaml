    category: gotcha
    text: >-
      Critical flags are keyed by (file, line_start) for updates but by (file, line_start, line_end) for removal. Two
      flags sharing the same file and line_start but different line_end will collide on update (first match wins) but
      can be independently removed.
    source: ai_generated

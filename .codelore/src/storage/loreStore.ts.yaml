    category: business_rule
    text: >-
      clearAll only wipes the personal store. This is a critical safety decision — accidentally clearing shared team
      knowledge would be catastrophic and irreversible. The UI label "Clear Personal Data" reinforces this, do not
      rename it to "Clear All" or similar.

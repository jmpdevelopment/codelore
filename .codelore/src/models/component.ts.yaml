    line_start: 39
    line_end: 47
    category: gotcha
    text: >-
      slugify can produce ids that fail isValidComponentId — e.g. a single hyphen input yields the fallback 'component',
      but an input like "A" yields "a" (valid). However, a 64-char slug ending in hyphen after slice will fail the
      regex's end-anchor requirement since replace(/^-+|-+$/g, '') runs before slice.
    source: ai_generated

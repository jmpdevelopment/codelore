    text: >-
      Re-anchor updates content_hash but does NOT update signature_hash. If the function was renamed and the body stayed
      the same, content hash relocates it correctly, but signature_hash becomes stale. Future re-anchors will lose the
      signature fallback for this annotation. Consider recomputing signature_hash during re-anchor.

annotations:
  - id: 9c74c169-567c-4ea2-9c50-532994b610a0
    file: src/storage/sharedStore.ts
    line_start: 38
    line_end: 47
    category: business_rule
    text: >-
      Symlink safety check in constructor. If .codediary/ is a symlink pointing outside the
      workspace, the store refuses to initialize. This prevents a supply chain attack where
      someone commits a symlink to a shared repo that exfiltrates annotation writes to an
      attacker-controlled directory.
    source: manual
    created_at: "2026-03-22T16:00:00Z"
    author: jmp
    dependencies:
      - file: src/storage/yamlStore.ts
        relationship: yamlStore has an identical symlink check — both must be kept in sync
  - id: 0c318781-f3fc-4cd5-9fb5-e4eec14b43a2
    file: src/storage/sharedStore.ts
    line_start: 66
    line_end: 73
    category: business_rule
    text: >-
      yamlPath() is the second layer of path traversal defense. Even if an annotation's file
      field passes isSafeRelativePath, yamlPath verifies the resolved path stays under .codediary/.
      Throws on violation — callers must handle.
    source: manual
    created_at: "2026-03-22T16:00:00Z"
    author: jmp
  - id: f5a3fb08-51e2-490d-a675-ebc20f2d7caa
    file: src/storage/sharedStore.ts
    line_start: 110
    line_end: 120
    category: needs_review
    text: >-
      saveFile re-checks symlink safety before every write, not just at construction. This
      catches the case where someone creates a symlink after the extension has already loaded.
      However, there is a TOCTOU race between the check and the write on line 122.
    source: manual
    created_at: "2026-03-22T16:00:00Z"
    author: jmp
critical_flags:
  - file: src/storage/sharedStore.ts

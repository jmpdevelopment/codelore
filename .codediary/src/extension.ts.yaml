    category: rationale
    text: >-
      Activation creates a single DiaryStore shared by all commands, views, and decorators. The store is disposed via
      subscriptions when the extension deactivates. Creating multiple DiaryStore instances would cause duplicate file
      watchers and stale cache issues.

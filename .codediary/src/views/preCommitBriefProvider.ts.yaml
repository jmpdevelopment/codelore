    file: src/views/preCommitBriefProvider.ts
    line_start: 186
    line_end: 210
    category: rationale
    text: >-
      buildKnowledge() runs git commands synchronously on every tree refresh. This is acceptable because VS Code
      TreeDataProviders are called lazily (only when the panel is visible). If a file watcher on .git/index is ever
      added, this should be debounced or cached.
    source: human_authored
    created_at: '2026-03-22T16:00:00Z'
    author: jmp
